<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="css/style.css?v=1772600539">
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-inner">
      <a href="index.html" class="nav-logo" aria-label="Home">

      <div class="nav-right">

          <a href="index.html"    class="nav-link">Home</a>
          <a href="about.html"   class="nav-link">About</a>
          <a href="projects.html" class="nav-link">Projects</a>
          <a href="papers.html"  class="nav-link">Papers</a>
          <a href="awards.html"  class="nav-link">Awards</a>

        </div>
        <div class="nav-actions">
          <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="테마 전환"></button>
          <button id="mobile-menu-btn" class="nav-menu-btn" aria-label="Open menu" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </nav>
  <div id="mobile-nav" class="mobile-nav">
    <a href="index.html"    class="nav-link">Home</a>
    <a href="about.html"   class="nav-link">About</a>
    <a href="projects.html" class="nav-link">Projects</a>
    <a href="papers.html"  class="nav-link">Papers</a>
    <a href="awards.html"  class="nav-link">Awards</a>
    <a href="blog.html"    class="nav-link">Blog</a>

  <!-- ── Page Content ── -->
  <main class="page-content">
    <div class="container">

      <!-- ── Gallery View ── -->
      <div id="gallery-view">
        <div class="page-header">
          <div>
            <h1 class="page-title">Projects</h1>
            <p class="page-subtitle">프로젝트, 공모전, 교육</p>
          </div>
        </div>

        <!-- Toolbar: 탭 + 검색 -->
        <div class="awards-toolbar">
          <div class="award-tabs" id="project-tabs">
            <button class="award-tab active" data-type="">전체</button>
            <button class="award-tab" data-type="education">교육</button>
            <button class="award-tab" data-type="project">프로젝트</button>
            <button class="award-tab" data-type="competition">공모전</button>
          </div>
          <div class="search-wrap">
            <svg class="search-icon" width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input class="search-input" id="search-input" type="search" placeholder="검색 (제목, 분류)">
          </div>
        </div>

        <p class="search-count" id="search-count"></p>

        <!-- 카드 갤러리 -->
        <div class="project-gallery" id="project-gallery"></div>

        <!-- 페이지네이션 -->
        <div class="pagination" id="pagination"></div>
      </div>

      <!-- ── Detail View ── -->
      <div id="detail-view" style="display:none">
        <div class="project-detail" id="detail-content"></div>
      </div>

    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    <div class="footer-inner">
      <p class="footer-text">© 2026 Jung Jinho. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/data.js"></script>
  <script>
    const PAGE_SIZE = 6;

    let allItems   = [];
    let sortedAll  = []; // 날짜순 전체 (prev/next용)
    let currentTab   = '';
    let currentQuery = '';
    let currentPage  = 1;

    /* ── 날짜 파싱 ── */
    function parseDate(str) {
      if (!str) return new Date(0);
      return new Date(str.replace(/\./g, '-'));
    }

    /* ── 날짜 포맷: "YYYY.MM.DD" → "YYYY년 MM월 DD일" ── */
    function fmtDate(str) {
      if (!str) return '';
      const p = str.split('.');
      if (p.length === 3) return `${p[0]}년 ${p[1]}월 ${p[2]}일`;
      if (p.length === 2) return `${p[0]}년 ${p[1]}월`;
      return str;
    }

    /* ── 기간 포맷: "YYYY.MM.DD ~ YYYY.MM.DD" 양쪽 변환 ── */
    function fmtPeriod(str) {
      if (!str) return '';
      return str.split('~').map(s => fmtDate(s.trim())).join(' ~ ');
    }

    /* ── 타입 라벨 / 클래스 ── */
    const TYPE_LABEL = { education: '교육', project: '프로젝트', competition: '공모전' };
    const TYPE_CLASS = { education: 'proj-education', project: 'proj-project', competition: 'proj-competition' };

    /* ── 검색 카운트 ── */
    function updateCount(filtered, query) {
      const el = document.getElementById('search-count');
      if (!el) return;
      el.textContent = query
        ? `"${query}" 검색 결과: ${filtered.length}개`
        : (filtered.length ? `총 ${filtered.length}개` : '');
    }

    /* ── 갤러리 렌더링 ── */
    function renderGallery(items) {
      const container = document.getElementById('project-gallery');
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `<div class="project-empty">${currentQuery ? `"${currentQuery}"에 대한 결과가 없습니다` : '아직 프로젝트가 없습니다'}</div>`;
        return;
      }

      container.innerHTML = items.map(item => {
        const typeLabel = TYPE_LABEL[item.type] || item.type || '';
        const typeClass = TYPE_CLASS[item.type] || 'proj-project';
        const dateStr = item.date
          ? (item.dateEnd ? `${fmtDate(item.date)} ~ ${fmtDate(item.dateEnd)}` : fmtDate(item.date))
          : '';

        const imgHtml = item.image
          ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'project-card-img-placeholder\\'><svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'1.5\\'><rect x=\\'3\\' y=\\'3\\' width=\\'18\\' height=\\'18\\' rx=\\'2\\'/><circle cx=\\'8.5\\' cy=\\'8.5\\' r=\\'1.5\\'/><polyline points=\\'21 15 16 10 5 21\\'/></svg></div>'">`
          : `<div class="project-card-img-placeholder"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

        return `
          <div class="project-card" onclick="openDetail('${escapeHtml(item.id)}')">
            <div class="project-card-img">${imgHtml}</div>
            <div class="project-card-body">
              <p class="project-card-title">${escapeHtml(item.title)}</p>
              <div class="project-card-meta">
                ${typeLabel ? `<span class="type-badge ${typeClass}">${escapeHtml(typeLabel)}</span>` : ''}
                ${dateStr ? `<span class="project-card-date">${dateStr}</span>` : ''}
              </div>
              ${item.summary ? `<p class="project-card-summary">${escapeHtml(item.summary)}</p>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    /* ── 페이지네이션 렌더링 ── */
    function renderPagination(totalPages) {
      const container = document.getElementById('pagination');
      if (!container) return;
      if (totalPages <= 1) { container.innerHTML = ''; return; }

      let html = `<button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">‹</button>`;
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">›</button>`;
      container.innerHTML = html;
    }

    /* ── 갤러리 갱신 ── */
    function refresh() {
      const sorted = [...allItems].sort((a, b) => parseDate(b.date) - parseDate(a.date));
      sortedAll = sorted; // prev/next 전체 기준

      let filtered = currentTab
        ? sorted.filter(item => item.type === currentTab)
        : [...sorted];

      if (currentQuery) {
        const q = currentQuery.toLowerCase();
        filtered = filtered.filter(item => {
          const fields = [item.title, item.type, TYPE_LABEL[item.type], item.summary];
          return fields.some(f => f && String(f).toLowerCase().includes(q));
        });
      }

      updateCount(filtered, currentQuery);

      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = 1;
      const pageItems = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

      renderGallery(pageItems);
      renderPagination(totalPages);
    }

    function goPage(n) {
      currentPage = n;
      refresh();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ── 상세 페이지 열기 ── */
    function openDetail(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      history.pushState({ itemId: id }, '', '#' + id);
      renderDetail(item);
      document.getElementById('gallery-view').style.display = 'none';
      document.getElementById('detail-view').style.display = 'block';
      window.scrollTo(0, 0);
    }

    /* ── 상세 페이지 닫기 (뒤로가기) ── */
    function closeDetail() {
      history.pushState(null, '', location.pathname);
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('gallery-view').style.display = 'block';
      refresh();
      window.scrollTo(0, 0);
    }

    /* ── 상세 페이지 렌더링 ── */
    function renderDetail(item) {
      const idx = sortedAll.findIndex(i => i.id === item.id);
      const prevItem = sortedAll[idx + 1] || null; // 더 오래된 것
      const nextItem = sortedAll[idx - 1] || null; // 더 최신

      const typeLabel = TYPE_LABEL[item.type] || item.type || '';
      const typeClass = TYPE_CLASS[item.type] || 'proj-project';

      const dateStr = item.date
        ? (item.dateEnd ? `${fmtDate(item.date)} ~ ${fmtDate(item.dateEnd)}` : fmtDate(item.date))
        : '';

      // 첨부파일
      const attachHtml = (item.attachments && item.attachments.length)
        ? `<div class="project-detail-section">
            <p class="project-detail-section-title">첨부파일</p>
            <div class="project-attachments">
              ${item.attachments.map(a => `
                <a href="${escapeHtml(a.path)}" class="project-attachment-link" target="_blank" rel="noopener noreferrer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:0.5">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                  </svg>
                  ${escapeHtml(a.name)}
                </a>`).join('')}
            </div>
          </div>`
        : '';

      // 타임라인
      const timelineHtml = (item.timeline && item.timeline.length)
        ? `<div class="project-detail-section">
            <p class="project-detail-section-title">타임라인</p>
            <div class="project-timeline">
              ${item.timeline.map((t, i) => `
                <div class="project-timeline-item">
                  <p class="project-timeline-num">${String(i + 1).padStart(2, '0')}</p>
                  <p class="project-timeline-label">${escapeHtml(t.label)}</p>
                  <p class="project-timeline-period">${fmtPeriod(t.period)}</p>
                </div>`).join('')}
            </div>
          </div>`
        : '';

      // 참고링크
      const linksHtml = (item.links && item.links.length)
        ? `<div class="project-detail-section">
            <p class="project-detail-section-title">참고링크</p>
            <div class="project-links">
              ${item.links.map(l => {
                let domain = '';
                try { domain = new URL(l.url).hostname; } catch {}
                return `
                  <a href="${escapeHtml(l.url)}" class="project-link-card" target="_blank" rel="noopener noreferrer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;color:var(--color-text-muted)">
                      <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
                      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <div class="project-link-info">
                      <p class="project-link-title">${escapeHtml(l.title)}</p>
                      <p class="project-link-domain">${escapeHtml(domain)}</p>
                    </div>
                    <svg class="project-link-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
                    </svg>
                  </a>`;
              }).join('')}
            </div>
          </div>`
        : '';

      // 커버 이미지
      const coverHtml = item.image
        ? `<div class="project-detail-cover">
            <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}" onerror="this.parentElement.style.display='none'">
          </div>`
        : '';

      // Prev / Next
      const prevHtml = prevItem
        ? `<button class="project-nav-btn" onclick="openDetail('${escapeHtml(prevItem.id)}')">
            <span class="project-nav-label">← 이전 글</span>
            <span class="project-nav-title">${escapeHtml(prevItem.title)}</span>
          </button>`
        : `<button class="project-nav-btn disabled">
            <span class="project-nav-label">← 이전 글</span>
            <span class="project-nav-title" style="color:var(--color-text-muted)">첫 번째 글입니다</span>
          </button>`;

      const nextHtml = nextItem
        ? `<button class="project-nav-btn right" onclick="openDetail('${escapeHtml(nextItem.id)}')">
            <span class="project-nav-label">다음 글 →</span>
            <span class="project-nav-title">${escapeHtml(nextItem.title)}</span>
          </button>`
        : `<button class="project-nav-btn right disabled">
            <span class="project-nav-label">다음 글 →</span>
            <span class="project-nav-title" style="color:var(--color-text-muted)">마지막 글입니다</span>
          </button>`;

      document.getElementById('detail-content').innerHTML = `
        <button class="project-detail-back" onclick="closeDetail()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Projects로 돌아가기
        </button>

        <h1 class="project-detail-title">${escapeHtml(item.title)}</h1>

        <div class="project-detail-meta">
          ${typeLabel ? `<span class="type-badge ${typeClass}">${escapeHtml(typeLabel)}</span>` : ''}
          ${dateStr ? `<span class="project-detail-date">${dateStr}</span>` : ''}
          ${item.summary ? `<span class="project-detail-date">· ${escapeHtml(item.summary)}</span>` : ''}
        </div>

        ${coverHtml}
        ${attachHtml}
        ${timelineHtml}
        ${linksHtml}

        <div class="project-nav">
          ${prevHtml}
          ${nextHtml}
        </div>`;
    }

    /* ── 브라우저 뒤로가기 처리 ── */
    window.addEventListener('popstate', (e) => {
      if (e.state && e.state.itemId) {
        const item = allItems.find(i => i.id === e.state.itemId);
        if (item) {
          renderDetail(item);
          document.getElementById('gallery-view').style.display = 'none';
          document.getElementById('detail-view').style.display = 'block';
          window.scrollTo(0, 0);
          return;
        }
      }
      document.getElementById('detail-view').style.display = 'none';
      document.getElementById('gallery-view').style.display = 'block';
      refresh();
      window.scrollTo(0, 0);
    });

    /* ── 탭 이벤트 ── */
    document.querySelectorAll('.award-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#project-tabs .award-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.type;
        currentPage = 1;
        refresh();
      });
    });

    /* ── 검색 이벤트 ── */
    document.getElementById('search-input').addEventListener('input', e => {
      currentQuery = e.target.value;
      currentPage = 1;
      refresh();
    });

    /* ── 초기 로드 ── */
    (async () => {
      allItems = await loadAllData('projects');

      // URL 해시로 바로 상세 페이지 진입
      const hash = location.hash.slice(1);
      if (hash) {
        const item = allItems.find(i => i.id === hash);
        if (item) {
          sortedAll = [...allItems].sort((a, b) => parseDate(b.date) - parseDate(a.date));
          renderDetail(item);
          document.getElementById('gallery-view').style.display = 'none';
          document.getElementById('detail-view').style.display = 'block';
          return;
        }
      }

      refresh();
    })();
  </script>
</body>
</html>
