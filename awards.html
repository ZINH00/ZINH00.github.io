  <!-- ── Page Content ── -->
  <main class="page-content">

          <h1 class="page-title">Awards</h1>

      <!-- ── Toolbar: 탭 + 검색 ── -->
      <div class="awards-toolbar">
        <div class="award-tabs" id="award-tabs">
          <button class="award-tab active" data-type="">전체</button>

        <div class="search-wrap">
          <svg class="search-icon" width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>

            placeholder="검색 (제목, 기관, 유형)">
        </div>
      </div>

      <p class="search-count" id="search-count"></p>

      <!-- List -->

  <!-- ── Footer ── -->

  <script src="js/main.js"></script>
  <script src="js/data.js"></script>
  <script>
    const PAGE = 'awards';
    const PAGE_SIZE = 7;

    let allItems = [];
    let currentTab = '';
    let currentQuery = '';
    let currentPage = 1;

    function parseDate(str) {
      if (!str) return new Date(0);
      return new Date(str.replace(/\./g, '-'));
    }

    function updateCount(filtered, query) {
      const el = document.getElementById('search-count');
      if (!el) return;
      el.textContent = query
        ? `"${query}" 검색 결과: ${filtered.length}개`
        : (filtered.length ? `총 ${filtered.length}개` : '');
    }

    function refresh() {
      // 날짜 내림차순 정렬 후 역순 번호 부여
      const sorted = [...allItems].sort((a, b) => parseDate(b.date) - parseDate(a.date));
      const total = sorted.length;
      sorted.forEach((item, i) => { item._num = total - i; });

      // 탭 필터
      let filtered = currentTab
        ? sorted.filter(item => item.type === currentTab)
        : [...sorted];

      // 검색 필터
      if (currentQuery) {
        const q = currentQuery.toLowerCase();
        filtered = filtered.filter(item => {
          const fields = [item.title, item.issuer, item.description, item.type];
          return fields.some(f => f && String(f).toLowerCase().includes(q));
        });
      }

      updateCount(filtered, currentQuery);

      // 페이지네이션
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = 1;
      const pageItems = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

      renderAwardsList(pageItems, filtered.length);
      renderPagination(totalPages);
    }

    function renderAwardsList(items, totalFiltered) {
      const container = document.getElementById('list-section');
      if (!container) return;

      if (!items.length) {
        container.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            <p class="empty-state-title">${currentQuery ? `"${currentQuery}"에 대한 결과가 없습니다` : '아직 항목이 없습니다'}</p>
          </div>`;
        return;
      }

      container.innerHTML = items.map(item => buildAwardItem(item, item._num, PAGE)).join('');
    }

    function renderPagination(totalPages) {
      const container = document.getElementById('pagination');
      if (!container) return;
      if (totalPages <= 1) { container.innerHTML = ''; return; }

      let html = `<button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''}
        onclick="goPage(${currentPage - 1})">‹</button>`;

      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}"
          onclick="goPage(${i})">${i}</button>`;
      }

      html += `<button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''}
        onclick="goPage(${currentPage + 1})">›</button>`;

      container.innerHTML = html;
    }

    function goPage(n) {
      currentPage = n;
      refresh();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 탭 이벤트
    document.querySelectorAll('.award-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.award-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = btn.dataset.type;
        currentPage = 1;
        refresh();
      });
    });

    // 검색 이벤트
    document.getElementById('search-input').addEventListener('input', e => {
      currentQuery = e.target.value;
      currentPage = 1;
      refresh();
    });

    (async () => {
      allItems = await loadAllData(PAGE);
      refresh();
    })();
  </script>
</body>
